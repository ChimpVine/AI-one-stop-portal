<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9d7; /* Light yellow */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        h1 {
            color: #850f8d; /* Dark purple */
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 14px;
            color: #333;
            text-align: left;
            margin-bottom: 5px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            width: 100%;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        button {
            background-color: #850f8d; /* Dark purple */
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #a32fa1; /* Slightly lighter purple */
        }

        a.button {
            display: inline-block;
            background-color: #007bff; /* Blue */
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 16px;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #0056b3; /* Dark blue on hover */
        }

        p {
            margin: 15px 0;
        }
        
        .error {
            color: red;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        
        .success {
            color: green;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Admin User</h1>
        {% if success_message %}
            <p class="success">{{ success_message }}</p>
        {% endif %}
        <form id="adminForm" method="POST" action="{{ url_for('create_admin') }}">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <div class="error" id="emailError">
                {% if form.email.errors %}
                    {{ form.email.errors[0] }}
                {% endif %}
            </div>
            
            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" name="full_name" required>
            
            <label for="password">Password:</label>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" required>
                <i class="far fa-eye-slash toggle-password" id="togglePassword"></i>
            </div>
            
            <button type="submit">Create Admin</button>
        </form>
        
        <a href="{{ url_for('index') }}" class="button">Back to Index</a>
    </div>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function (e) {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('adminForm').addEventListener('submit', function (e) {
            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('emailError');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(emailInput.value)) {
                emailError.textContent = 'Please enter a valid email address.';
                e.preventDefault();
            } else {
                emailError.textContent = '';
            }
        });
    </script>
</body>
</html>
