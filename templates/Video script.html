<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Processing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9d7; /* Light yellow */
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: #850f8d; /* Dark purple */
            padding: 10px 0;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
        }

        nav ul li a:hover {
            background-color: #c738bd; /* Purple on hover */
        }

        h1, h2 {
            text-align: center;
            color: #850f8d; /* Dark purple */
            margin-top: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form label {
            margin-bottom: 10px;
            color: #333;
        }

        form input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
            width: 80%;
        }

        form button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #850f8d; /* Dark purple */
            color: #fff;
            cursor: pointer;
        }

        form button:hover {
            background-color: #c738bd; /* Purple on hover */
        }

        .flashes {
            list-style-type: none;
            padding: 0;
        }

        .flash-success {
            background-color: #d4edda; /* Bootstrap success color */
            color: #155724; /* Dark green */
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .flash-warning {
            background-color: #f8d7da; /* Bootstrap danger color */
            color: #721c24; /* Dark red */
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <h1>Process Google Sheet Data</h1>
    <div class="container">
        <form method="post" action="/video_script">
            <label for="sheet_id">Google Sheet ID:</label>
            <input type="text" id="sheet_id" name="sheet_id" required><br><br>
            <label for="folder_id">Google Drive Folder ID:</label>
            <input type="text" id="folder_id" name="folder_id" required><br><br>
            <button type="submit">Process</button>
        </form>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flashes">
                    {% for category, message in messages %}
                        <li class="flash-{{ category }}">
                            {{ message }}
                        </li>
                    {% endfor %}    
                </ul>
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
