<!doctype html>
<html>
<head>
    <title>Staff Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9d7; /* Light yellow */
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: #850f8d; /* Dark purple */
            padding: 10px 0;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
        }

        nav ul li a:hover {
            background-color: #c738bd; /* Purple on hover */
        }

        h1, h2 {
            text-align: center;
            color: #850f8d; /* Dark purple */
            margin-top: 20px;
        }

        /* Add styles for other content of the dashboard here */
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <h1>Welcome, This H5P Section </h1>
    <h2>{{ current_user.full }}</h2>
    <h2>{{ current_user.email }}</h2>

    <!-- Other content of the dashboard goes here -->



</body>
</html>
