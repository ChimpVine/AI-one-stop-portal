<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9d7; /* Light yellow */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        h1 {
            color: #850f8d; /* Dark purple */
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: calc(100% - 36px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #ccc;
        }

        .toggle-password:hover {
            color: #333;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #c738bd; /* Purple */
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #e49bff; /* Light purple */
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
            text-align: left;
        }
        
        a.button {
            display: inline-block;
            background-color: #007bff; /* Blue */
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 16px;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #0056b3; /* Dark blue on hover */
        }
    </style>
</head>
<body>
    <form method="post" action="{{ url_for('register') }}">
        <h1>Register</h1>
        <p>
            <label for="full_name">Full Name:</label><br>
            <input type="text" id="full_name" name="full_name" required><br>
            {% if errors.full_name %}
                <span class="error">{{ errors.full_name }}</span>
            {% endif %}
        </p>
        <p>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
            {% if errors.email %}
                <span class="error">{{ errors.email }}</span>
            {% endif %}
        </p>
        <p>
            <label for="password">Password:</label><br>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" required>
                <i class="far fa-eye-slash toggle-password" id="togglePassword1"></i>
            </div>
            {% if errors.password %}
                <span class="error">{{ errors.password }}</span>
            {% endif %}
        </p>
        <p>
            <label for="password2">Confirm Password:</label><br>
            <div class="input-wrapper">
                <input type="password" id="password2" name="password2" required>
                <i class="far fa-eye-slash toggle-password" id="togglePassword2"></i>
            </div>
            {% if errors.password2 %}
                <span class="error">{{ errors.password2 }}</span>
            {% endif %}
        </p>
        <p><input type="submit" value="Register"></p>
        <a href="{{ url_for('index') }}" class="button">Back</a>
    </form>
    
    <script>
        document.getElementById('togglePassword1').addEventListener('click', function (e) {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('togglePassword2').addEventListener('click', function (e) {
            const passwordInput = document.getElementById('password2');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
