<!doctype html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9d7; /* Light yellow */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px; /* Adjusted width */
            text-align: center;
        }

        h1 {
            color: #850f8d; /* Dark purple */
            margin-bottom: 20px; /* Added margin */
        }

        p {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #c738bd; /* Purple */
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #e49bff; /* Light purple */
        }
    </style>
</head>
<body>
    <form method="post" action="{{ url_for('register') }}">
        <h1>Register</h1>
        {{ form.hidden_tag() }}
        <p>
            {{ form.full_name.label }}<br>
            {{ form.full_name(size=40) }}<br> <!-- Increased size -->
        </p>
        <p>
            {{ form.email.label }}<br>
            {{ form.email(size=40) }}<br> <!-- Increased size -->
        </p>
        <p>
            {{ form.password.label }}<br>
            {{ form.password(size=40) }}<br> <!-- Increased size -->
        </p>
        <p>
            {{ form.password2.label }}<br>
            {{ form.password2(size=40) }}<br> <!-- Increased size -->
        </p>
        <p>{{ form.submit() }}</p>
    </form>
</body>
</html>
