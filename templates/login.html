<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <title>Sign In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9d7; /* Light yellow */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #850f8d; /* Dark purple */
        }

        p {
            margin-bottom: 15px;
            position: relative; /* Added for eye icon positioning */
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .password-container {
            position: relative;
            width: 85%;
            margin-bottom: 10px;
        }

        .password-container input {
            width: calc(100% - 30px); /* Adjusted for eye icon */
            padding-right: 30px; /* Space for the eye icon */
        }

        .toggle-password {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #850f8d; /* Dark purple */
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #c738bd; /* Purple */
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #e49bff; /* Light purple */
        }
    </style>
</head>
<body>
    <form method="post" action="{{ url_for('login') }}">
        <h1>Sign In</h1>
        {{ form.hidden_tag() }}
        <p>
            {{ form.email.label }}<br>
            {{ form.email(size=32, type="email") }}<br>
        </p>
        <div class="password-container">
            {{ form.password.label }}<br>
            {{ form.password(size=32, type="password", id="id_password") }}
            <i class="far fa-eye-slash toggle-password" id="togglePassword"></i>
        </div>
        <p>{{ form.submit() }}</p>
    </form>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#id_password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye slash icon
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
